<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Phantasmagoria</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-container { max-width: 400px; margin: 100px auto; padding: 2rem; background: var(--card-bg); border-radius: var(--radius-md); border: 1px solid var(--border); box-shadow: var(--shadow-lg); }
    .auth-header { text-align: center; margin-bottom: 2rem; }
    #status-message { padding: .75rem; border-radius: var(--radius-sm); margin-top: 1rem; }
    .msg-error { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
    .msg-success { background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-header">
      <h1 class="mb-2">New Password</h1>
      <p class="text-sm text-secondary">Please enter your new university password below.</p>
    </div>

    <form id="reset-password-form">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" id="new-password" class="form-input" placeholder="At least 8 characters" required minlength="8">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirm-password" class="form-input" placeholder="Confirm your password" required minlength="8">
      </div>
      
      <!-- Using type="button" to be absolutely safe against native submits -->
      <button type="button" id="submit-btn" class="btn btn-primary btn-full">Save New Password</button>
      
      <div id="status-message" class="text-center text-sm hidden"></div>
    </form>
    
    <div class="text-center mt-6">
      <a href="/" class="text-sm text-accent">Back to Login</a>
    </div>
  </div>

  <script>
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('status-message');
    
    // 1. Get the token from the URL immediately
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      msg.textContent = 'Error: Reset token is missing from the URL. Please check your email link.';
      msg.className = 'text-center text-sm msg-error';
      msg.classList.remove('hidden');
      btn.disabled = true;
    }

    // 2. Handle the click instead of submit to be safe
    btn.addEventListener('click', async () => {
      const newPassword = document.getElementById('new-password').value;
      const confirm    = document.getElementById('confirm-password').value;

      // Basic validation
      if (newPassword.length < 8) {
        msg.textContent = 'Password must be at least 8 characters.';
        msg.className = 'text-center text-sm msg-error';
        msg.classList.remove('hidden');
        return;
      }

      if (newPassword !== confirm) {
        msg.textContent = 'Passwords do not match.';
        msg.className = 'text-center text-sm msg-error';
        msg.classList.remove('hidden');
        return;
      }

      // Start loading
      btn.disabled = true;
      btn.textContent = 'Saving...';
      msg.classList.add('hidden');

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });

        const data = await response.json();

        if (response.ok) {
          msg.textContent = 'Success! Redirecting you to login...';
          msg.className = 'text-center text-sm msg-success';
          msg.classList.remove('hidden');
          setTimeout(() => { window.location.href = '/'; }, 2000);
        } else {
          let errorMsg = data.message || 'Error: Could not reset password.';
          if (data.errors && data.errors.length > 0) {
            errorMsg = data.errors.map(e => e.msg).join(' | ');
          }
          msg.textContent = errorMsg;
          msg.className = 'text-center text-sm msg-error';
          msg.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Save New Password';
        }
      } catch (err) {
        msg.textContent = 'Server Error: Could not connect to Phantasmagoria.';
        msg.className = 'text-center text-sm msg-error';
        msg.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Save New Password';
      }
    });
  </script>
</body>
</html>
