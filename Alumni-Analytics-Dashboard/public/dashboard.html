<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <nav class="navbar">
    <div class="nav-brand">Phantasmagoria Analytics</div>
    <div class="nav-links">
      <a href="/dashboard.html" class="active">Dashboard</a>
      <a href="/analytics.html">Analytics</a>
      <a href="/alumni.html">Alumni</a>
      <button id="logout-btn" class="btn">Logout</button>
    </div>
  </nav>

  <main class="dashboard-content" style="padding-top: 1rem; padding-bottom: 1rem;">
    <div class="hero-illustration"
      style="position: relative; margin-bottom: 1.5rem; border-radius: var(--radius); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 1px solid var(--border-color);">
      <img src="/img/dashboard_illustration.png" alt="Phantasmagoria Analytics Dashboard"
        style="width: 100%; height: 180px; object-fit: cover; display: block; opacity: 0.75;">
      <h1
        style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); margin: 0; font-size: 3rem; font-weight: 800; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.9), 0 0 20px rgba(20,184,166,0.3); letter-spacing: 2px;">
        Overview</h1>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Alumni</h3>
        <p id="stat-total-alumni">Loading...</p>
      </div>
      <div class="stat-card">
        <h3>Top Certification</h3>
        <p id="stat-top-cert">Loading...</p>
      </div>
      <div class="stat-card">
        <h3>Top Employer</h3>
        <p id="stat-top-employer">Loading...</p>
      </div>
      <div class="stat-card">
        <h3>Top Job Title</h3>
        <p id="stat-top-job">Loading...</p>
      </div>

      <!-- Second Row of Stats -->
      <div class="stat-card">
        <h3>Top Course</h3>
        <p id="stat-top-course">Loading...</p>
      </div>
      <div class="stat-card">
        <h3>Top Licence</h3>
        <p id="stat-top-licence">Loading...</p>
      </div>
      <div class="stat-card">
        <h3>Top Industry</h3>
        <p id="stat-top-industry">Loading...</p>
      </div>
      <div class="stat-card">
        <h3>Regional Hub</h3>
        <p id="stat-top-location">Loading...</p>
      </div>
    </div>
  </main>
  <script src="/js/dashboard.js"></script>
</body>

</html>
