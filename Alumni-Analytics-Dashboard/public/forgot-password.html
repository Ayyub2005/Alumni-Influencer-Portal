<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - Dashbaord</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h2>Password Recovery</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">
        Enter your staff email address and we'll send you a link to securely reset your password.
      </p>
      <form id="forgot-form">
        <input type="email" id="forgot-email" placeholder="Staff Email Address" required>
        <button type="submit" class="btn">Send Recovery Link</button>
      </form>
      <div id="forgot-msg" style="margin-top: 1rem; font-size: 0.9rem;"></div>
      
      <hr>
      <div style="text-align: center;">
        <a href="index.html" class="link-text">Return to Login</a>
      </div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
