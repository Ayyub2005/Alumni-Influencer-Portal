<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password - Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h2>Create New Password</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">
        Please enter your new staff password below. It must be at least 8 characters.
      </p>
      <form id="reset-form">
        <input type="password" id="reset-password" placeholder="New Password" minlength="8" required>
        <button type="submit" class="btn">Update Password</button>
      </form>
      <div id="reset-msg" style="margin-top: 1rem; font-size: 0.9rem;"></div>
      
      <hr>
      <div style="text-align: center;">
        <a href="index.html" class="link-text">Return to Login</a>
      </div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
